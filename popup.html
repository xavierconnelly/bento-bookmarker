<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Life Bento Bookmarker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #666;
      --text-dim: #999;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.12);
      --danger: #ff5f57;
      --radius: 8px;
      --font: 'DM Mono', 'Fira Mono', monospace;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-mark {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      padding: 3px;
    }
    .logo-mark span {
      background: var(--bg);
      border-radius: 1px;
      display: block;
    }
    .logo-text {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .count-badge {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* ── Capture section ── */
    .capture-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
    }
    .btn:hover {
      background: var(--surface-2);
      border-color: #3e3e3e;
    }
    .btn.primary {
      background: var(--accent-dim);
      border-color: rgba(200, 240, 96, 0.25);
      color: var(--accent);
    }
    .btn.primary:hover {
      background: rgba(200, 240, 96, 0.18);
      border-color: rgba(200, 240, 96, 0.4);
    }
    .btn-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .btn-text {
      flex: 1;
    }
    .btn-meta {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── Bookmarks list ── */
    .list-section {
      max-height: 280px;
      overflow-y: auto;
    }
    .list-section::-webkit-scrollbar { width: 4px; }
    .list-section::-webkit-scrollbar-track { background: transparent; }
    .list-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .list-header {
      padding: 10px 16px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .clear-btn {
      font-size: 10px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      padding: 2px 4px;
      border-radius: 4px;
    }
    .clear-btn:hover { color: var(--danger); }

    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.6;
    }

    .bookmark-item {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      transition: background 0.1s;
    }
    .bookmark-item:hover { background: var(--surface); }
    .bookmark-item:last-child { border-bottom: none; }

    .bookmark-favicon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      margin-top: 1px;
      border-radius: 2px;
      background: var(--surface-2);
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
    }
    .bookmark-title {
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      line-height: 1.4;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bookmark-title:hover { color: var(--accent); }
    .bookmark-url {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .bookmark-tag {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
      letter-spacing: 0.05em;
    }
    .bookmark-tag.bulk { color: #60a5fa; border-color: rgba(96, 165, 250, 0.2); background: rgba(96, 165, 250, 0.08); }
    .bookmark-tag.all  { color: #a78bfa; border-color: rgba(167, 139, 250, 0.2); background: rgba(167, 139, 250, 0.08); }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      margin-top: 0px;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .bookmark-item:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { color: var(--danger); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="logo-text">Life Bento</span>
    </div>
    <span class="count-badge" id="count-badge">0 saved</span>
  </div>

  <div class="capture-section">
    <div class="section-label">Capture</div>

    <button class="btn primary" id="btn-save-one">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="2" width="12" height="10" rx="1.5"/>
        <path d="M5 14h6M8 12v2"/>
      </svg>
      <span class="btn-text">Save this tab</span>
    </button>

    <button class="btn" id="btn-save-window">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="3" width="14" height="10" rx="1.5"/>
        <path d="M1 6h14"/>
        <path d="M5 6v7M10 6v7"/>
      </svg>
      <span class="btn-text">Save all tabs — this window</span>
      <span class="btn-meta" id="window-count"></span>
    </button>

    <button class="btn" id="btn-save-all">
      <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="5" width="12" height="9" rx="1.5"/>
        <rect x="3" y="3" width="12" height="9" rx="1.5" opacity="0.4"/>
        <rect x="5" y="1" width="10" height="9" rx="1.5" opacity="0.2"/>
      </svg>
      <span class="btn-text">Save all tabs — all windows</span>
      <span class="btn-meta" id="all-count"></span>
    </button>
  </div>

  <div class="list-section" id="list-section">
    <div class="list-header">
      <span class="section-label" style="margin:0">Saved</span>
      <button class="clear-btn" id="btn-clear">clear all</button>
    </div>
    <div id="bookmark-list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
